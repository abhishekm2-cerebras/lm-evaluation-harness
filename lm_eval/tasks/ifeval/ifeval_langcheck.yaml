task: english_ifeval_with_langcheck
dataset_path: google/IFEval
dataset_name: null
output_type: generate_until
test_split: train
num_fewshot: 0
process_docs: !function utils_langcheck.process_docs
doc_to_text: prompt
doc_to_target: 0
generation_kwargs:
  until: []
  do_sample: false
  temperature: 0.0
  max_gen_toks: 16384
process_results: !function utils_langcheck.process_results
metric_list:
  # Without langcheck (normal IFEval)
  - metric: prompt_level_strict_acc
    aggregation: mean
    higher_is_better: true
  - metric: inst_level_strict_acc
    aggregation: !function utils_langcheck.agg_inst_level_acc
    higher_is_better: true
  - metric: prompt_level_loose_acc
    aggregation: mean
    higher_is_better: true
  - metric: inst_level_loose_acc
    aggregation: !function utils_langcheck.agg_inst_level_acc
    higher_is_better: true
  # With langcheck
  - metric: prompt_level_strict_langcheck_acc
    aggregation: mean
    higher_is_better: true
  - metric: inst_level_strict_langcheck_acc
    aggregation: !function utils_langcheck.agg_inst_level_acc
    higher_is_better: true
  - metric: prompt_level_loose_langcheck_acc
    aggregation: mean
    higher_is_better: true
  - metric: inst_level_loose_langcheck_acc
    aggregation: !function utils_langcheck.agg_inst_level_acc
    higher_is_better: true
  # Language check pass rate
  - metric: language_check_acc
    aggregation: mean
    higher_is_better: true
metadata:
  version: 4.1
